name: Sincronizar versão do Nexrota

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sincronizar-versao-nexrota
  cancel-in-progress: true

jobs:
  sincronizar:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5

      - name: Consultar e validar versão oficial
        shell: bash
        run: |
          set -euo pipefail

          curl \
            --fail \
            --silent \
            --show-error \
            --location \
            --connect-timeout 20 \
            --max-time 60 \
            --retry 6 \
            --retry-all-errors \
            --retry-delay 15 \
            --output latest.tmp.json \
            https://downloads.nexrota.com.br/android/latest.json

          jq -e '
            .platform == "android" and
            (.version | type == "string" and length > 0) and
            (.versionCode | type == "number" and . > 0) and
            (.publishedAt | type == "string" and test("^[0-9]{4}-[0-9]{2}-[0-9]{2}$")) and
            (.downloadUrl | type == "string" and startswith("https://downloads.nexrota.com.br/android/")) and
            (.sha256 | type == "string" and test("^[A-Fa-f0-9]{64}$")) and
            (.fileSize | type == "number" and . > 0)
          ' latest.tmp.json >/dev/null

          jq --sort-keys . latest.tmp.json > latest.json
          rm latest.tmp.json

      - name: Publicar somente quando houver mudança
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- latest.json; then
            echo "A versão publicada não mudou."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git commit -m "Atualiza versão oficial do Nexrota"
          git push
